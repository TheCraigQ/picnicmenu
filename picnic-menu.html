<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧺 Picnic Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: #fdf6e3;
    overflow-x: hidden;
  }

  .sky {
    background: linear-gradient(180deg, #87ceeb 0%, #b8e4f9 40%, #d4f1c4 70%, #fdf6e3 100%);
    min-height: 100vh;
    padding: 40px 20px 80px;
    position: relative;
  }

  /* Decorative sun */
  .sun {
    position: absolute;
    top: 30px; right: 60px;
    width: 70px; height: 70px;
    background: #FFD54F;
    border-radius: 50%;
    box-shadow: 0 0 0 12px rgba(255,213,79,0.3), 0 0 0 24px rgba(255,213,79,0.15);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 12px rgba(255,213,79,0.3),0 0 0 24px rgba(255,213,79,0.15)} 50%{box-shadow:0 0 0 18px rgba(255,213,79,0.3),0 0 0 36px rgba(255,213,79,0.12)} }

  /* Floating clouds */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .c1 { width:100px;height:30px;top:50px;left:80px; animation: drift 18s linear infinite; }
  .c1::before { width:50px;height:50px;top:-25px;left:15px; }
  .c1::after  { width:35px;height:35px;top:-15px;left:45px; }
  .c2 { width:80px;height:24px;top:90px;left:300px; animation: drift 24s linear infinite 4s; }
  .c2::before { width:40px;height:40px;top:-20px;left:12px; }
  .c2::after  { width:28px;height:28px;top:-12px;left:38px; }
  @keyframes drift { from{transform:translateX(-200px)} to{transform:translateX(120vw)} }

  /* Grass decoration */
  .grass { position:absolute;bottom:0;left:0;right:0;height:60px;background:#7cb568;border-radius:60% 60% 0 0 / 30px; }
  .grass::before { content:'';position:absolute;bottom:0;left:0;right:0;height:30px;background:#5a9e4a; }

  /* Card */
  .card {
    background: rgba(255,255,255,0.92);
    border-radius: 28px;
    padding: 36px 32px;
    max-width: 560px;
    margin: 0 auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    position: relative;
    z-index: 1;
  }

  .logo {
    text-align: center;
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    color: #4CAF50;
    margin-bottom: 4px;
  }
  .logo-sub { text-align:center; font-size:13px; color:#888; margin-bottom:28px; }

  /* Progress bar */
  .progress-wrap { display:flex; gap:6px; justify-content:center; margin-bottom:28px; }
  .pip {
    width: 32px; height: 6px;
    border-radius: 3px;
    background: #e8e8e8;
    transition: background 0.4s;
  }
  .pip.done { background: #66BB6A; }
  .pip.active { background: #FFB300; }

  /* Step */
  .step { display:none; }
  .step.visible { display:block; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

  .step-icon { font-size:36px; text-align:center; margin-bottom:8px; }
  .step-title { font-family:'Pacifico',cursive; font-size:20px; color:#2e7d32; text-align:center; margin-bottom:4px; }
  .step-hint { font-size:12px; color:#aaa; text-align:center; margin-bottom:20px; }

  /* Options grid */
  .options { display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:10px; margin-bottom:24px; }
  .opt {
    border: 2px solid #e0e0e0;
    border-radius: 16px;
    padding: 14px 10px 10px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    background: #fafafa;
    user-select: none;
  }
  .opt:hover { border-color: #a5d6a7; background: #f1f8e9; transform: translateY(-2px); }
  .opt.selected { border-color: #4CAF50; background: #e8f5e9; }
  .opt.selected .opt-emoji::after { content:'✓'; position:absolute;top:2px;right:2px;font-size:11px;background:#4CAF50;color:white;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center; }
  .opt-emoji { font-size:28px; display:block; position:relative; margin-bottom:6px; }
  .opt-label { font-size:12px; font-weight:700; color:#555; line-height:1.3; }

  /* Yes/No special */
  .yn-wrap { display:flex; gap:16px; justify-content:center; margin-bottom:24px; }
  .yn-btn {
    flex:1; max-width:160px;
    padding: 18px 10px;
    border-radius: 20px;
    border: 2.5px solid #e0e0e0;
    font-size:16px; font-weight:700;
    cursor:pointer; background:#fafafa;
    transition: all 0.2s;
    text-align:center;
  }
  .yn-btn:hover { transform:translateY(-3px); }
  .yn-yes:hover, .yn-yes.selected { border-color:#4CAF50; background:#e8f5e9; color:#2e7d32; }
  .yn-no:hover, .yn-no.selected  { border-color:#ef9a9a; background:#ffebee; color:#c62828; }

  /* Next button */
  .btn-next {
    display:block; width:100%;
    padding:14px;
    border-radius:16px;
    border:none;
    background:#4CAF50;
    color:white;
    font-family:'Nunito',sans-serif;
    font-size:16px; font-weight:700;
    cursor:pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-next:hover { background:#388E3C; transform:translateY(-1px); }
  .btn-next:disabled { background:#bdbdbd; cursor:not-allowed; transform:none; }

  /* Summary */
  .summary-title { font-family:'Pacifico',cursive; font-size:26px; color:#2e7d32; text-align:center; margin-bottom:6px; }
  .summary-sub { text-align:center; font-size:13px; color:#888; margin-bottom:28px; }
  .summary-row {
    display:flex; align-items:flex-start; gap:14px;
    padding:14px 0;
    border-bottom:1px dashed #e8e8e8;
  }
  .summary-row:last-child { border-bottom:none; }
  .s-icon { font-size:24px; flex-shrink:0; width:32px; text-align:center; }
  .s-cat { font-size:11px; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:.05em; }
  .s-val { font-size:15px; font-weight:700; color:#333; margin-top:2px; }
  .btn-restart {
    display:block; width:100%; margin-top:24px;
    padding:14px; border-radius:16px; border:2px solid #4CAF50;
    background:white; color:#2e7d32;
    font-family:'Nunito',sans-serif; font-size:15px; font-weight:700;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-restart:hover { background:#e8f5e9; }

  /* Little flowers */
  .flowers { text-align:center; font-size:20px; margin-bottom:16px; letter-spacing:6px; }
</style>
</head>
<body>
<div class="sky">
  <div class="sun"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>

  <div class="card">
    <div class="flowers">🌸 🌼 🌺 🌸</div>
    <div class="logo">🧺 Picnic Menu</div>
    <div class="logo-sub">pick your perfect basket</div>

    <div class="progress-wrap" id="progress"></div>

    <!-- Step 1: Main dish -->
    <div class="step" id="step-0">
      <div class="step-icon">🍽️</div>
      <div class="step-title">Main dish</div>
      <div class="step-hint">choose 1</div>
      <div class="options" id="opts-0"></div>
      <button class="btn-next" id="btn-0" disabled onclick="next(0)">Next →</button>
    </div>

    <!-- Step 2: Fruits -->
    <div class="step" id="step-1">
      <div class="step-icon">🍓</div>
      <div class="step-title">Fruits</div>
      <div class="step-hint">choose up to 3</div>
      <div class="options" id="opts-1"></div>
      <button class="btn-next" id="btn-1" disabled onclick="next(1)">Next →</button>
    </div>

    <!-- Step 3: Desserts -->
    <div class="step" id="step-2">
      <div class="step-icon">🍰</div>
      <div class="step-title">Desserts</div>
      <div class="step-hint">choose up to 2</div>
      <div class="options" id="opts-2"></div>
      <button class="btn-next" id="btn-2" disabled onclick="next(2)">Next →</button>
    </div>

    <!-- Step 4: Drinks -->
    <div class="step" id="step-3">
      <div class="step-icon">🥤</div>
      <div class="step-title">Drinks</div>
      <div class="step-hint">choose up to 2</div>
      <div class="options" id="opts-3"></div>
      <button class="btn-next" id="btn-3" disabled onclick="next(3)">Next →</button>
    </div>

    <!-- Step 5: The question -->
    <div class="step" id="step-4">
      <div class="step-icon">🌿</div>
      <div class="step-title">Joint? 🌿</div>
      <div class="step-hint">the most important question</div>
      <div class="yn-wrap">
        <div class="yn-btn yn-yes" onclick="selectYN('yes')">😌 Yes please</div>
        <div class="yn-btn yn-no"  onclick="selectYN('no')">😇 No thanks</div>
      </div>
      <button class="btn-next" id="btn-4" disabled onclick="next(4)">See my menu ✨</button>
    </div>

    <!-- Summary -->
    <div class="step" id="step-5">
      <div class="summary-title">Your picnic basket 🧺</div>
      <div class="summary-sub">here's everything you picked!</div>
      <div id="summary-body"></div>
      <button class="btn-restart" onclick="restart()">🔄 Start over</button>
    </div>
  </div>

  <div class="grass"></div>
</div>

<script>
const steps = [
  {
    max: 1,
    items: [
      { e:'🥪', l:'Sandwiches' },
      { e:'🌭', l:'Hot dogs' },
      { e:'🥐', l:'Croissants' },
      { e:'🥗', l:'Salad' },
    ]
  },
  {
    max: 3,
    items: [
      { e:'🍓', l:'Strawberries' },
      { e:'🍇', l:'Grapes' },
      { e:'🥭', l:'Mango' },
      { e:'🐉', l:'Dragon fruit' },
      { e:'🫐', l:'Blueberries' },
      { e:'🍊', l:'Oranges' },
    ]
  },
  {
    max: 2,
    items: [
      { e:'☕', l:'Tiramisu' },
      { e:'🤍', l:'"You"' },
      { e:'🎂', l:'Cake' },
      { e:'🥐', l:'Nutella croissants' },
      { e:'🧇', l:'Waffles' },
      { e:'🍫', l:'Brownies' },
      { e:'🍪', l:'Cookies' },
    ]
  },
  {
    max: 2,
    items: [
      { e:'🫧', l:'Sprite' },
      { e:'🥤', l:'Cola' },
      { e:'🍏', l:'Apple juice' },
      { e:'🍋', l:'Lemonade' },
      { e:'💧', l:'Water' },
      { e:'🍵', l:'Tea' },
      { e:'🍺', l:'Beer' },
    ]
  },
];

const catIcons = ['🍽️','🍓','🍰','🥤','🌿'];
const catNames = ['Main dish','Fruits','Desserts','Drinks','Joint? 🌿'];

let selections = [[], [], [], [], null];
let currentStep = 0;

function buildOptions() {
  steps.forEach((s, si) => {
    const wrap = document.getElementById('opts-'+si);
    wrap.innerHTML = s.items.map((it, ii) =>
      `<div class="opt" id="opt-${si}-${ii}" onclick="toggle(${si},${ii})">
        <span class="opt-emoji">${it.e}</span>
        <span class="opt-label">${it.l}</span>
      </div>`
    ).join('');
  });
}

function buildProgress() {
  const wrap = document.getElementById('progress');
  wrap.innerHTML = Array.from({length:5}, (_,i) =>
    `<div class="pip" id="pip-${i}"></div>`
  ).join('');
}

function updateProgress() {
  for(let i=0;i<5;i++){
    const p = document.getElementById('pip-'+i);
    p.className = 'pip' + (i<currentStep?' done':i===currentStep?' active':'');
  }
}

function showStep(n) {
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('visible'));
  document.getElementById('step-'+n).classList.add('visible');
  updateProgress();
}

function toggle(si, ii) {
  const s = steps[si];
  const sel = selections[si];
  const idx = sel.indexOf(ii);
  if(idx >= 0) {
    sel.splice(idx,1);
  } else {
    if(sel.length >= s.max) {
      const removed = sel.shift();
      document.getElementById(`opt-${si}-${removed}`).classList.remove('selected');
    }
    sel.push(ii);
  }
  document.getElementById(`opt-${si}-${ii}`).classList.toggle('selected', sel.includes(ii));
  document.getElementById('btn-'+si).disabled = sel.length === 0;
}

function selectYN(val) {
  selections[4] = val;
  document.querySelectorAll('.yn-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector('.yn-'+val).classList.add('selected');
  document.getElementById('btn-4').disabled = false;
}

function next(si) {
  currentStep = si + 1;
  showStep(currentStep);
  if(currentStep === 5) renderSummary();
}

function renderSummary() {
  const summaryData = [
    { cat:'Main dish', icon:'🍽️', val: selections[0].map(i=>steps[0].items[i].e+' '+steps[0].items[i].l).join(', ') },
    { cat:'Fruits',    icon:'🍓', val: selections[1].map(i=>steps[1].items[i].e+' '+steps[1].items[i].l).join(', ') },
    { cat:'Desserts',  icon:'🍰', val: selections[2].map(i=>steps[2].items[i].e+' '+steps[2].items[i].l).join(', ') },
    { cat:'Drinks',    icon:'🥤', val: selections[3].map(i=>steps[3].items[i].e+' '+steps[3].items[i].l).join(', ') },
    { cat:'Joint 🌿',  icon:'🌿', val: selections[4]==='yes'?'😌 Yes please':'😇 No thanks' },
  ];
  document.getElementById('summary-body').innerHTML = summaryData.map(r=>
    `<div class="summary-row">
      <span class="s-icon">${r.icon}</span>
      <div><div class="s-cat">${r.cat}</div><div class="s-val">${r.val}</div></div>
    </div>`
  ).join('');
}

function restart() {
  selections = [[],[],[],[],null];
  currentStep = 0;
  buildOptions();
  document.querySelectorAll('.btn-next').forEach(b=>b.disabled=true);
  document.querySelectorAll('.yn-btn').forEach(b=>b.classList.remove('selected'));
  showStep(0);
}

buildOptions();
buildProgress();
showStep(0);
</script>
</body>
</html>
